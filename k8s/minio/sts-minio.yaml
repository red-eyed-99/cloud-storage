apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-minio
  labels:
    app: minio
spec:
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: minio
            - containerPort: 9001
              name: minio-console
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: secrets
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: pvc-minio