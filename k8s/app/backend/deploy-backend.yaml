apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-backend
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mgnblack/cloud-storage-back-end:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: secrets
      